services:
  web:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    ports:
      - "${FORWARD_WEB_PORT:-8100}:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/home/appuser/app
      - filesystem-venv:/home/appuser/app/venv
    command: /bin/bash ./.docker/entrypoint.sh

  db:
    image: mysql:8.0
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASS}
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
    ports:
      - "${FORWARD_DB_PORT:-3308}:3306"
    volumes:
      - filesystem-db:/var/lib/mysql
      - ./.docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
    filesystem-db:
        driver: local
    filesystem-venv:
        driver: local
